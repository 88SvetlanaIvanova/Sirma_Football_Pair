spring:
  datasource:
    url: jdbc:h2:mem:football;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  # If your Flyway migrations are PostgreSQL-specific, disable for tests:
  flyway:
    enabled: false

logging:
  level:
    org.springframework: WARN
    org.hibernate.SQL: WARN